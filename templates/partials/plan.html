<div class="tab-box" hx-ext="ws" ws-connect="/ws/plan/">
    <div class="plan-hint">
        <p><strong>How this works</strong></p>
        <ol>
            <li>The agent has access to all your training data.</li>
            <li>Your describe a goal and preferences (race, race date, target time, preferred long run day, etc.)</li>
            <li>You get a plan you can add straight to your calendar</li>
        </ol>
    </div>
    <form id="plan-form"
          ws-send
          hx-trigger="click from:#plan-submit">
        <div class="plan-field">
            <label class="stat-label" for="plan-goal">Goal</label>
            <textarea id="plan-goal"
                      class="textarea"
                      name="goal"
                      rows="3"
                      placeholder="e.g. Half marathon on June 15th, targeting 1:30, max 4 days/week, long runs on Sundays"
                      required
                      disabled></textarea>
        </div>
        <div class="right">
            <button type="submit" id="plan-submit" disabled>Generate</button>
        </div>
    </form>
    <div id="plan-status" class="bordered-block plan-status"></div>
    <div id="plan-result"></div>
</div>
<script>htmx.process(document.querySelector(".plan-box"));</script>
