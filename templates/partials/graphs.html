{{ visualizations|json_script:"visualizations" }}
{% if stats %}
<div class="stats-section">
        <div class="stat-item">
                <span class="stat-label">Distance YTD</span>
                <span class="stat-value">{{ stats.pretty_total_kms|floatformat:"0" }} km</span>
        </div>
        <div class="stat-item">
                <span class="stat-label">Runs YTD</span>
                <span class="stat-value">{{ stats.total_runs }}</span>
        </div>
        <div class="stat-item">
                <span class="stat-label">Predicted marathon</span>
                <span class="stat-value">{{ current_tanda }} ({{ current_tanda_pace }})</span>
        </div>
        <div class="stat-item">
                <span class="stat-label">Avg HR per km</span>
                <span class="stat-value">{{ avg_hr_per_km }}</span>
        </div>
</div>
{% endif %}
<div class="visualization">
        <div class="chart" id="weekly_chart"></div>
        <div class="chart" id="running_heatmap"></div>
        <div class="chart" id="rolling_tanda"></div>
        <div class="chart" id="marathon_predictor"></div>
        <div class="chart" id="cumulative_yearly"></div>
</div>
<script>
(function() {
        const visualizations = JSON.parse(document.getElementById("visualizations").textContent);

        function getVegaTheme() {
                return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "default";
        }

        function applyVegaTheme() {
                const vega_theme = getVegaTheme();
                Object.keys(visualizations).forEach(function(key) {
                        const spec = JSON.parse(visualizations[key]);
                        vegaEmbed("#" + key, spec, { renderer: "svg", actions: false, theme: vega_theme });
                });
        }

        applyVegaTheme();

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyVegaTheme);
})();
</script>
