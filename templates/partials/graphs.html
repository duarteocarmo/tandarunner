{{ visualizations|json_script:"visualizations" }}
<div class="visualization">
        <div class="chart" id="weekly_chart">Visualization 1</div>
        <div class="chart" id="running_heatmap">Visualization 2</div>
        <div class="chart" id="rolling_tanda">Visualization 4</div>
        <div class="chart" id="marathon_predictor">Visualization 3</div>
        <div class="chart" id="cumulative_yearly">Visualization 5</div>
</div>
<script>
(function() {
        const visualizations = JSON.parse(document.getElementById("visualizations").textContent);

        function getVegaTheme() {
                return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "default";
        }

        const vega_theme = getVegaTheme();
        Object.keys(visualizations).forEach(function(key) {
                const spec = JSON.parse(visualizations[key]);
                vegaEmbed("#" + key, spec, { renderer: "svg", actions: false, theme: vega_theme });
        });
})();
</script>
